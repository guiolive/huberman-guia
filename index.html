<script>
(function(){
  'use strict';

  var LS_CH='biblioteca:chapters', LS_LAST='biblioteca:last', LS_READ='biblioteca:read';
  /* chaves dos capítulos-semente já importados — permite publicar capítulos
     novos sem apagar as edições locais nem ressuscitar os que foram excluídos */
  var LS_SEEN='biblioteca:seedkeys';

  var reader=document.getElementById('reader'),
      toc=document.getElementById('toc'),
      search=document.getElementById('search'),
      progress=document.getElementById('progress'),
      side=document.getElementById('side'),
      overlay=document.getElementById('overlay'),
      menuBtn=document.getElementById('menuBtn'),
      newBtn=document.getElementById('newBtn'),
      brand=document.getElementById('brand');

  var editor=document.getElementById('editor'),
      editorBack=document.getElementById('editorBack'),
      edMode=document.getElementById('edMode'),
      edKicker=document.getElementById('edKicker'),
      edNum=document.getElementById('edNum'),
      edTag=document.getElementById('edTag'),
      edTitle=document.getElementById('edTitle'),
      edSub=document.getElementById('edSub'),
      edBody=document.getElementById('edBody'),
      edSave=document.getElementById('edSave'),
      edDelete=document.getElementById('edDelete'),
      edCancel=document.getElementById('edCancel');

  var chapters=[];      // modelo de dados
  var currentId=null;   // capítulo em exibição
  var editingId=null;   // capítulo em edição (null = novo)

  /* ---------- persistência ---------- */
  function loadCh(){ try{ return JSON.parse(localStorage.getItem(LS_CH)||'null'); }catch(e){ return null; } }
  function saveCh(){ localStorage.setItem(LS_CH, JSON.stringify(chapters)); }
  function loadSeen(){ try{ return JSON.parse(localStorage.getItem(LS_SEEN)||'null'); }catch(e){ return null; } }
  function saveSeen(k){ localStorage.setItem(LS_SEEN, JSON.stringify(k)); }
  function getRead(){ try{ return JSON.parse(localStorage.getItem(LS_READ)||'[]'); }catch(e){ return []; } }
  function markRead(id){ var r=getRead(); if(r.indexOf(id)===-1){ r.push(id); localStorage.setItem(LS_READ,JSON.stringify(r)); } }

  /* ---------- utilidades ---------- */
  function uid(){ return 'cap-'+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36); }
  function byId(id){ for(var i=0;i<chapters.length;i++){ if(chapters[i].id===id) return chapters[i]; } return null; }
  function indexOf(id){ for(var i=0;i<chapters.length;i++){ if(chapters[i].id===id) return i; } return -1; }
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function nextNum(){
    var mx=0; chapters.forEach(function(c){ var n=parseInt(c.num,10); if(!isNaN(n)&&n>mx) mx=n; });
    var s=String(mx+1); return s.length<2 ? '0'+s : s;
  }

  /* ---------- semente inicial ---------- */
  function seed(){
    var tpl=document.getElementById('seed');
    var arts=tpl.content.querySelectorAll('article');
    var list=[];
    Array.prototype.forEach.call(arts,function(a){
      var clone=a.cloneNode(true);
      var txt=function(sel){ var el=clone.querySelector(sel); return el?el.textContent.trim():''; };
      var kicker=txt('.ch-kicker'), title=txt('h1'), sub=txt('.ch-sub');
      ['.ch-kicker','h1','.ch-sub','.ch-meta'].forEach(function(sel){ var el=clone.querySelector(sel); if(el) el.parentNode.removeChild(el); });
      // decodifica entidades da etiqueta (ex.: &amp; -> &)
      var dec=document.createElement('textarea'); dec.innerHTML=a.getAttribute('data-tag')||'';
      list.push({
        id:uid(),
        key:a.getAttribute('data-key')||'',
        kicker:kicker,
        num:a.getAttribute('data-num')||'',
        tag:dec.value,
        title:title,
        sub:sub,
        body:clone.innerHTML.trim()
      });
    });
    return list;
  }

  /* ---------- render ---------- */
  function chapterEl(ch){
    var art=document.createElement('article');
    art.className='chapter'; art.id=ch.id;

    var actions=document.createElement('div'); actions.className='ch-actions';
    actions.innerHTML=
      '<button type="button" data-act="edit">Editar</button>'+
      '<button type="button" data-act="up" title="Mover para cima">↑</button>'+
      '<button type="button" data-act="down" title="Mover para baixo">↓</button>'+
      '<button type="button" data-act="del" class="danger">Excluir</button>';
    Array.prototype.forEach.call(actions.querySelectorAll('button'),function(b){ b.setAttribute('data-id',ch.id); });
    art.appendChild(actions);

    if(ch.kicker){ var k=document.createElement('p'); k.className='ch-kicker'; k.textContent=ch.kicker; art.appendChild(k); }
    var h=document.createElement('h1'); h.textContent=ch.title||'Sem título'; art.appendChild(h);
    if(ch.sub){ var s=document.createElement('p'); s.className='ch-sub'; s.textContent=ch.sub; art.appendChild(s); }
    var body=document.createElement('div'); body.className='ch-body'; body.innerHTML=ch.body||''; art.appendChild(body);
    return art;
  }

  function renderReader(){
    reader.innerHTML='';
    if(!chapters.length){
      reader.innerHTML='<div class="empty-state"><h2>Sua biblioteca está vazia</h2>'+
        '<p>Crie o primeiro capítulo para começar a escrever.</p>'+
        '<button class="new-btn" id="emptyNew" style="max-width:240px;margin:20px auto 0">+ Novo capítulo</button></div>';
      var en=document.getElementById('emptyNew'); if(en) en.addEventListener('click',openNew);
      return;
    }
    chapters.forEach(function(ch){ reader.appendChild(chapterEl(ch)); });
  }

  function buildTOC(){
    toc.innerHTML='';
    if(!chapters.length){ toc.innerHTML='<li class="empty">Nenhum capítulo ainda.</li>'; return; }
    var read=getRead();
    chapters.forEach(function(ch){
      var li=document.createElement('li'), a=document.createElement('a');
      a.href='#'+ch.id; a.dataset.id=ch.id;
      if(read.indexOf(ch.id)!==-1) a.classList.add('read');
      a.innerHTML='<span class="t-read" aria-hidden="true"></span>'+
        '<span class="t-num">'+esc(ch.num)+'</span>'+
        '<span class="t-title">'+esc(ch.title||'Sem título')+'</span>'+
        (ch.tag?'<span class="t-tag">'+esc(ch.tag)+'</span>':'');
      li.appendChild(a); toc.appendChild(li);
    });
  }

  function show(id){
    var target=byId(id) || chapters[0];
    if(!target){ currentId=null; return; }
    id=target.id; currentId=id;
    Array.prototype.forEach.call(reader.querySelectorAll('.chapter'),function(a){ a.classList.toggle('active',a.id===id); });
    Array.prototype.forEach.call(toc.querySelectorAll('a'),function(a){ a.classList.toggle('active',a.dataset.id===id); });
    markRead(id);
    var link=toc.querySelector('a[data-id="'+id+'"]'); if(link) link.classList.add('read');
    localStorage.setItem(LS_LAST,id);
    window.scrollTo(0,0); updateProgress(); closeSide();
  }

  function refresh(keepId){
    renderReader(); buildTOC();
    var want=keepId || currentId;
    show(byId(want)?want:(chapters[0]&&chapters[0].id));
  }

  /* ---------- CRUD ---------- */
  function openEditor(){ editorBack.classList.add('show'); editor.classList.add('show'); }
  function closeEditor(){ editorBack.classList.remove('show'); editor.classList.remove('show'); editingId=null; }

  function openNew(){
    editingId=null;
    edMode.textContent='Novo capítulo';
    edKicker.value=''; edNum.value=nextNum(); edTag.value='';
    edTitle.value=''; edSub.value=''; edBody.innerHTML='';
    edDelete.style.display='none';
    closeSide(); openEditor(); edTitle.focus();
  }

  function openEdit(id){
    var ch=byId(id); if(!ch) return;
    editingId=id;
    edMode.textContent='Editar capítulo';
    edKicker.value=ch.kicker||''; edNum.value=ch.num||''; edTag.value=ch.tag||'';
    edTitle.value=ch.title||''; edSub.value=ch.sub||''; edBody.innerHTML=ch.body||'';
    edDelete.style.display='';
    openEditor(); edTitle.focus();
  }

  function saveEditor(){
    var data={
      kicker:edKicker.value.trim(),
      num:edNum.value.trim(),
      tag:edTag.value.trim(),
      title:edTitle.value.trim()||'Sem título',
      sub:edSub.value.trim(),
      body:edBody.innerHTML.trim()
    };
    var id;
    if(editingId){
      var ch=byId(editingId);
      for(var k in data){ if(data.hasOwnProperty(k)) ch[k]=data[k]; }
      id=editingId;
    } else {
      id=uid(); data.id=id; chapters.push(data);
    }
    saveCh(); closeEditor(); refresh(id);
  }

  function deleteChapter(id){
    if(!window.confirm('Excluir este capítulo? Isso não pode ser desfeito.')) return;
    chapters=chapters.filter(function(c){ return c.id!==id; });
    saveCh();
    if(editingId===id) closeEditor();
    if(currentId===id) currentId=null;
    refresh();
  }

  function moveChapter(id,dir){
    var i=indexOf(id); if(i<0) return;
    var j=i+dir; if(j<0||j>=chapters.length) return;
    var tmp=chapters[i]; chapters[i]=chapters[j]; chapters[j]=tmp;
    saveCh(); refresh(id);
  }

  /* ---------- barra de ferramentas do editor ---------- */
  function runCmd(cmd,val){
    edBody.focus();
    if(cmd==='formatBlock'){ document.execCommand('formatBlock', false, val); }
    else if(cmd==='callout'){
      var labels={key:'Nota', apply:'Aplicar', warn:'Cuidado', term:'Termo'};
      document.execCommand('insertHTML', false,
        '<div class="callout '+val+'"><p class="c-label">'+(labels[val]||'Nota')+'</p><p>Escreva aqui…</p></div><p><br></p>');
    }
    else if(cmd==='hr'){ document.execCommand('insertHTML', false, '<hr><p><br></p>'); }
    else if(cmd==='link'){ var u=window.prompt('URL do link:'); if(u) document.execCommand('createLink', false, u); }
    else { document.execCommand(cmd, false, val||null); }
  }

  /* ---------- barra de progresso / busca / menu ---------- */
  function updateProgress(){ var h=document.documentElement, max=h.scrollHeight-h.clientHeight; progress.style.width=(max>0?(h.scrollTop/max)*100:0)+'%'; }
  function filterTOC(){ var q=search.value.trim().toLowerCase(); Array.prototype.forEach.call(toc.querySelectorAll('a'),function(a){ a.parentNode.style.display=(!q||a.textContent.toLowerCase().indexOf(q)!==-1)?'':'none'; }); }
  function openSide(){ side.classList.add('open'); overlay.classList.add('show'); }
  function closeSide(){ side.classList.remove('open'); overlay.classList.remove('show'); }

  /* ---------- eventos ---------- */
  reader.addEventListener('click',function(e){
    var btn=e.target.closest ? e.target.closest('.ch-actions button') : null;
    if(!btn) return;
    var id=btn.getAttribute('data-id'), act=btn.getAttribute('data-act');
    if(act==='edit') openEdit(id);
    else if(act==='del') deleteChapter(id);
    else if(act==='up') moveChapter(id,-1);
    else if(act==='down') moveChapter(id,1);
  });

  Array.prototype.forEach.call(document.querySelectorAll('.ed-toolbar button'),function(b){
    b.addEventListener('mousedown',function(e){ e.preventDefault(); }); // preserva a seleção do texto
    b.addEventListener('click',function(){ runCmd(b.getAttribute('data-cmd'), b.getAttribute('data-val')); });
  });

  newBtn.addEventListener('click',openNew);
  edSave.addEventListener('click',saveEditor);
  edCancel.addEventListener('click',closeEditor);
  edDelete.addEventListener('click',function(){ if(editingId) deleteChapter(editingId); });
  editorBack.addEventListener('click',closeEditor);
  brand.addEventListener('click',function(e){ e.preventDefault(); if(chapters[0]) show(chapters[0].id); });

  document.addEventListener('keydown',function(e){ if(e.key==='Escape' && editor.classList.contains('show')) closeEditor(); });
  window.addEventListener('hashchange',function(){ var id=location.hash.replace('#',''); if(id&&byId(id)) show(id); });
  window.addEventListener('scroll',updateProgress,{passive:true});
  search.addEventListener('input',filterTOC);
  menuBtn.addEventListener('click',openSide);
  overlay.addEventListener('click',closeSide);

  /* ---------- init ---------- */
  chapters=loadCh();
  var seedList=seed();

  if(!chapters || !chapters.length){
    /* 1ª visita: importa a semente inteira */
    chapters=seedList;
    saveSeen(seedList.map(function(s){ return s.key; }).filter(Boolean));
    saveCh();
  }else{
    /* já existe lista salva: mescla só os capítulos-semente inéditos */
    var seen=loadSeen();
    if(seen===null){
      /* migração (quem salvou antes das chaves existirem): considera importado
         todo capítulo-semente cujo título já está na lista salva */
      seen=seedList.filter(function(s){
        return chapters.some(function(c){ return c.title===s.title; });
      }).map(function(s){ return s.key; });
    }
    var novos=0;
    seedList.forEach(function(s){
      if(s.key && seen.indexOf(s.key)===-1){ chapters.push(s); seen.push(s.key); novos++; }
    });
    saveSeen(seen);
    if(novos) saveCh();
  }

  renderReader(); buildTOC();
  var start=location.hash.replace('#','');
  if(!byId(start)) start=localStorage.getItem(LS_LAST);
  if(!byId(start)) start=chapters[0] && chapters[0].id;
  if(start) show(start);
})();
</script>

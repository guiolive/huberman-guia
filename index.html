<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Biblioteca de estudos</title>
<meta name="description" content="Biblioteca editável de guias visuais de estudo.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ============================================================
   TOKENS, tema editorial (creme + serifa) e acentos funcionais
   ============================================================ */
:root{
  --bg:#F7F4EC;
  --surface:#FFFFFF;
  --ink:#242424;
  --title:#191919;
  --muted:#6B6B6B;
  --rule:#E6E3DA;
  --btn:#191919;
  --accent:#1A8917;

  /* 4 cores funcionais em versão terrosa/dessaturada */
  --f-key:#6E5A8F;    /* roxo, ideia-chave / marcação  */
  --f-apply:#A8632E;  /* ocre, aplicar / alerta        */
  --f-focus:#3E7D74;  /* verde-azulado, foco / termo   */
  --f-warn:#A85570;   /* argila-rosa, cuidado / dopamina*/

  --serif-display:'Fraunces', Georgia, 'Times New Roman', serif;
  --serif-body:'Source Serif 4', Georgia, serif;
  --sans:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

  --col:44rem;
  --side:290px;
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font-family:var(--serif-body); font-size:19px; line-height:1.7;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}

.progress{position:fixed; top:0; left:0; height:2px; width:0%; background:var(--title); z-index:60; transition:width .1s linear}

/* ============================================================
   LAYOUT
   ============================================================ */
.shell{display:flex; min-height:100vh}

.side{
  width:var(--side); border-right:1px solid var(--rule); background:var(--bg);
  position:fixed; top:0; left:0; height:100vh; overflow-y:auto; padding:28px 22px 40px;
}
.brand{
  font-family:var(--serif-display); font-weight:700; font-size:1.5rem;
  letter-spacing:-.02em; color:var(--title); text-decoration:none; display:block;
}
.brand small{
  display:block; font-family:var(--sans); font-weight:500; font-size:.7rem;
  letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-top:6px;
}
.new-btn{
  width:100%; margin:20px 0 4px; padding:10px 14px; font-family:var(--sans);
  font-weight:600; font-size:.85rem; color:var(--surface); background:var(--btn);
  border:none; border-radius:999px; cursor:pointer;
}
.new-btn:hover{opacity:.9}
.search{
  width:100%; margin:16px 0 18px; padding:9px 12px; font-family:var(--sans);
  font-size:.85rem; color:var(--ink); background:var(--surface);
  border:1px solid var(--rule); border-radius:999px; outline:none;
}
.search:focus{border-color:var(--muted)}
.side-label{
  font-family:var(--sans); font-size:.68rem; font-weight:600; letter-spacing:.14em;
  text-transform:uppercase; color:var(--muted); margin:8px 0 10px;
}
.toc{list-style:none; margin:0; padding:0}
.toc a{
  display:block; padding:11px 12px 11px 14px; margin:2px 0; text-decoration:none;
  color:var(--ink); border-radius:8px; border-left:2px solid transparent;
  position:relative; transition:background .15s, border-color .15s;
}
.toc a:hover{background:var(--surface)}
.toc a.active{border-left-color:var(--title); background:var(--surface)}
.toc .t-num{display:block; font-family:var(--sans); font-size:.7rem; font-weight:600; letter-spacing:.1em; color:var(--muted)}
.toc a.active .t-num{color:var(--title)}
.toc .t-title{display:block; font-family:var(--serif-display); font-weight:600; font-size:1.02rem; line-height:1.3; color:var(--title); margin-top:3px; letter-spacing:-.01em}
.toc .t-tag{display:inline-block; margin-top:6px; font-family:var(--sans); font-size:.66rem; letter-spacing:.06em; color:var(--muted)}
.toc .t-read{position:absolute; top:15px; right:12px; width:7px; height:7px; border-radius:50%; background:var(--accent); opacity:0}
.toc a.read .t-read{opacity:1}
.toc .empty{color:var(--muted); font-style:italic; padding:10px 14px; font-size:.9rem}

.main{margin-left:var(--side); min-width:0; padding:0 40px}
.reader{max-width:var(--col); margin:0 auto; padding:64px 0 120px}

.topbar{display:none; position:sticky; top:0; z-index:50; align-items:center; gap:14px; padding:12px 18px; background:var(--bg); border-bottom:1px solid var(--rule)}
.menu-btn{font:inherit; font-family:var(--sans); font-size:.85rem; background:none; border:1px solid var(--rule); border-radius:999px; padding:7px 14px; color:var(--ink); cursor:pointer}
.topbar .tb-title{font-family:var(--serif-display); font-weight:700; letter-spacing:-.02em}

/* ============================================================
   CAPÍTULO
   ============================================================ */
.chapter{display:none}
.chapter.active{display:block; animation:fade .35s ease both}
@keyframes fade{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}

/* barra de ações por capítulo (CRUD) */
.ch-actions{display:flex; gap:8px; margin:0 0 26px; flex-wrap:wrap}
.ch-actions button{font-family:var(--sans); font-size:.75rem; font-weight:500; color:var(--muted); background:var(--surface); border:1px solid var(--rule); border-radius:999px; padding:5px 12px; cursor:pointer; line-height:1.2}
.ch-actions button:hover{color:var(--title); border-color:var(--muted)}
.ch-actions .danger:hover{color:var(--f-warn); border-color:var(--f-warn)}

.ch-kicker{font-family:var(--sans); font-size:.72rem; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin:0 0 18px}
.chapter h1{font-family:var(--serif-display); font-weight:700; font-size:clamp(2.3rem,5vw,3.4rem); line-height:1.05; letter-spacing:-.025em; color:var(--title); margin:0 0 .4em}
.ch-sub{font-family:var(--sans); font-weight:400; font-size:1.2rem; line-height:1.5; color:var(--muted); margin:0 0 34px; padding-bottom:26px; border-bottom:1px solid var(--rule)}

.chapter h2{font-family:var(--serif-display); font-weight:600; font-size:1.7rem; letter-spacing:-.015em; color:var(--title); margin:2.4em 0 .3em; line-height:1.2}
.chapter h3{font-family:var(--serif-display); font-weight:600; font-size:1.15rem; color:var(--title); margin:1.6em 0 .3em}
.chapter p{margin:0 0 1.1em}
.chapter a{color:var(--title); text-underline-offset:3px}
.chapter strong{font-weight:700; color:var(--title)}
.chapter ul{margin:0 0 1.2em; padding-left:1.3em}
.chapter li{margin:.35em 0}
.chapter li::marker{color:var(--muted)}

/* frase-guia curta abaixo de um h2 */
.lead{font-family:var(--serif-body); font-size:1.15rem; color:var(--ink); margin:.2em 0 1em}
.lead em{font-style:italic}

/* ênfases funcionais inline */
.k-alerta{color:var(--f-apply); font-weight:600}
.k-foco{color:var(--f-focus); font-weight:600}
.k-marca{color:var(--f-key); font-weight:600}
.k-dopa{color:var(--f-warn); font-weight:600}

blockquote{margin:1.6em 0; padding:2px 0 2px 26px; border-left:3px solid var(--title); font-family:var(--serif-display); font-style:italic; font-size:1.3rem; line-height:1.45; color:var(--title)}

hr{border:none; border-top:1px solid var(--rule); margin:2.4em 0}

/* ---- callouts ---- */
.callout{margin:1.5em 0; padding:16px 20px 16px 22px; background:var(--surface); border:1px solid var(--rule); border-left:3px solid var(--muted); border-radius:4px}
.callout .c-label{font-family:var(--sans); font-size:.68rem; font-weight:600; letter-spacing:.12em; text-transform:uppercase; margin:0 0 6px}
.callout p:last-child{margin-bottom:0}
.callout.key{border-left-color:var(--f-key)} .callout.key .c-label{color:var(--f-key)}
.callout.apply{border-left-color:var(--f-apply)} .callout.apply .c-label{color:var(--f-apply)}
.callout.term{border-left-color:var(--f-focus)} .callout.term .c-label{color:var(--f-focus)}
.callout.warn{border-left-color:var(--f-warn)} .callout.warn .c-label{color:var(--f-warn)}

/* ---- stats: cartões de números-chave ---- */
.stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin:1.8em 0}
.stat{padding:20px 18px; background:var(--surface); border:1px solid var(--rule); border-radius:8px}
.stat .n{font-family:var(--serif-display); font-weight:700; font-size:2.1rem; line-height:1; letter-spacing:-.02em; color:var(--title)}
.stat .n small{font-size:.85rem; font-weight:600; color:var(--muted)}
.stat .l{font-family:var(--sans); font-size:.82rem; line-height:1.4; color:var(--muted); margin-top:9px}
.stat.apply .n{color:var(--f-apply)}
.stat.focus .n{color:var(--f-focus)}
.stat.key   .n{color:var(--f-key)}
.stat.dopa  .n{color:var(--f-warn)}

/* ---- equação tipográfica (assinatura Parte I) ---- */
.equation{margin:2.2em 0; padding:26px 24px; background:var(--surface); border:1px solid var(--rule); border-radius:8px; text-align:center}
.equation .terms{display:flex; flex-wrap:wrap; justify-content:center; align-items:flex-start; gap:10px 8px}
.equation .term{min-width:118px; padding:4px 6px}
.equation .term .tt{display:block; margin-bottom:4px; font-family:var(--sans); font-size:.64rem; font-weight:600; letter-spacing:.12em; text-transform:uppercase}
.equation .term .nm{display:block; font-family:var(--serif-display); font-weight:600; font-size:1.15rem; color:var(--title)}
.equation .term .sr{display:block; margin-top:2px; font-family:var(--sans); font-size:.72rem; color:var(--muted)}
.equation .op{align-self:center; font-family:var(--serif-display); font-size:1.5rem; color:var(--muted)}
.equation .result{margin-top:18px; padding-top:16px; border-top:1px solid var(--rule); font-family:var(--serif-display); font-style:italic; font-size:1.18rem; color:var(--title); line-height:1.4}

/* ---- duo: dois cartões ---- */
.duo{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin:1.7em 0}
.duo .d-card{padding:18px 20px; background:var(--surface); border:1px solid var(--rule); border-radius:8px}
.duo .d-card.plastic{border-top:3px solid var(--f-focus)}
.duo .d-card.fixed{border-top:3px solid var(--muted)}
.duo .d-badge{font-family:var(--sans); font-size:.64rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--muted)}
.duo .d-card h4{font-family:var(--serif-display); font-size:1.12rem; color:var(--title); margin:8px 0 6px}
.duo .d-card p{margin:0; font-size:.95rem; line-height:1.55}

/* ---- facts: bloco de dados / experimento ---- */
.facts{margin:1.7em 0; border:1px solid var(--rule); border-radius:8px; overflow:hidden; background:var(--surface)}
.facts .f-row{display:grid; grid-template-columns:150px 1fr; gap:16px; padding:14px 20px; border-top:1px solid var(--rule)}
.facts .f-row:first-child{border-top:none}
.facts .f-lab{font-family:var(--sans); font-size:.7rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--muted)}
.facts .f-val{font-size:.97rem; line-height:1.55}

/* ---- steps: passos numerados ---- */
.steps{margin:1.7em 0}
.steps .step{display:grid; grid-template-columns:40px 1fr; gap:14px; padding:16px 0; border-top:1px solid var(--rule)}
.steps .step:first-child{border-top:none}
.steps .st-n{font-family:var(--serif-display); font-weight:700; font-size:1.35rem; color:var(--title); line-height:1.2}
.steps .step h4{font-family:var(--serif-display); font-size:1.1rem; margin:0 0 4px}
.steps .step p{margin:0; font-size:.95rem; line-height:1.55}

/* ---- bars ---- */
.bars{margin:1.7em 0}
.bars .bar{display:grid; grid-template-columns:132px 1fr 46px; align-items:center; gap:12px; margin:9px 0}
.bars .b-lab{font-family:var(--sans); font-size:.85rem; color:var(--ink)}
.bars .b-lab small{display:block; font-size:.7rem; color:var(--muted)}
.bars .b-track{height:8px; background:var(--rule); border-radius:99px; overflow:hidden}
.bars .b-fill{height:100%; background:var(--f-focus); border-radius:99px}
.bars .bar.warn .b-fill{background:var(--f-warn)}
.bars .b-val{font-family:var(--sans); font-size:.82rem; font-weight:600; color:var(--title); text-align:right}

/* ---- curva assinatura Parte II ---- */
.curve{margin:1.8em 0 2em; text-align:center}
.curve svg{max-width:100%; height:auto}
.curve .base{stroke:var(--muted); stroke-width:1; stroke-dasharray:4 4; fill:none}
.curve .trace{stroke:var(--title); stroke-width:2.2; fill:none; stroke-linecap:round; stroke-linejoin:round}
.curve .debt{fill:var(--f-warn); opacity:.12}
.curve .lbl{font-family:var(--sans); font-size:12px; fill:var(--muted)}
.curve .lbl.hi{fill:var(--f-warn); font-weight:600; letter-spacing:.06em}
.curve .lbl.lo{fill:var(--f-warn)}
.curve .c-cap{font-family:var(--sans); font-size:.85rem; color:var(--muted); margin-top:10px}

/* ---- takeaways ---- */
.takeaways{margin:2.4em 0; padding:26px 28px; background:var(--surface); border:1px solid var(--rule); border-radius:8px}
.takeaways .tk-label{font-family:var(--sans); font-size:.7rem; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin:0 0 14px}
.takeaways ol{counter-reset:tk; list-style:none; margin:0; padding:0}
.takeaways li{position:relative; padding-left:42px; margin:0 0 14px; line-height:1.45}
.takeaways li:last-child{margin-bottom:0}
.takeaways li::before{counter-increment:tk; content:counter(tk); position:absolute; left:0; top:1px; font-family:var(--serif-display); font-weight:700; font-size:1.2rem; color:var(--title)}

/* ---- fontes ---- */
.sources{margin-top:3em; padding-top:20px; border-top:1px solid var(--rule); font-family:var(--sans); font-size:.85rem; color:var(--muted)}
.sources h2{font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; font-family:var(--sans); color:var(--muted); margin:0 0 12px}
.sources ul{list-style:none; padding:0; margin:0}
.sources li{margin:0 0 12px}
.sources .s-t{color:var(--ink); font-weight:600}
.sources a{color:var(--title)}

/* ---- estado vazio ---- */
.empty-state{text-align:center; padding:90px 0; color:var(--muted)}
.empty-state h2{font-family:var(--serif-display); font-weight:700; font-size:1.8rem; color:var(--title); border:none; margin:0 0 10px}
.empty-state p{margin:0 0 4px}

/* ============================================================
   EDITOR (CRUD)
   ============================================================ */
.editor-back{display:none; position:fixed; inset:0; background:rgba(25,25,25,.4); z-index:70}
.editor-back.show{display:block}
.editor{
  display:none; position:fixed; z-index:71; top:50%; left:50%; transform:translate(-50%,-50%);
  width:min(760px,94vw); max-height:92vh; background:var(--bg); border:1px solid var(--rule);
  border-radius:12px; box-shadow:0 20px 60px rgba(25,25,25,.25); flex-direction:column; overflow:hidden;
}
.editor.show{display:flex}
.ed-head{display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--rule)}
.ed-head .ed-mode{font-family:var(--serif-display); font-weight:700; font-size:1.15rem; color:var(--title)}
.ed-x{font-family:var(--sans); font-size:.8rem; background:none; border:1px solid var(--rule); border-radius:999px; padding:6px 12px; color:var(--ink); cursor:pointer}
.ed-x:hover{border-color:var(--muted)}
.ed-fields{padding:18px 20px; overflow-y:auto}
.ed-fields label{display:block; font-family:var(--sans); font-size:.72rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin:0 0 14px}
.ed-fields input{display:block; width:100%; margin-top:6px; padding:9px 12px; font-family:var(--serif-body); font-size:1rem; color:var(--ink); background:var(--surface); border:1px solid var(--rule); border-radius:8px; text-transform:none; letter-spacing:normal; font-weight:400}
.ed-fields input:focus{outline:none; border-color:var(--muted)}
.ed-row{display:grid; grid-template-columns:120px 1fr; gap:14px}
.ed-toolbar{display:flex; flex-wrap:wrap; gap:6px; margin:4px 0 0}
.ed-toolbar button{font-family:var(--sans); font-size:.78rem; color:var(--ink); background:var(--surface); border:1px solid var(--rule); border-radius:6px; padding:5px 9px; cursor:pointer}
.ed-toolbar button:hover{border-color:var(--muted)}
.ed-body{margin-top:10px; min-height:220px; max-height:44vh; overflow-y:auto; padding:16px 18px; background:var(--surface); border:1px solid var(--rule); border-radius:8px; font-family:var(--serif-body); font-size:1rem; line-height:1.6; color:var(--ink)}
.ed-body:focus{outline:none; border-color:var(--muted)}
.ed-body:empty:before{content:attr(data-ph); color:var(--muted)}
.ed-foot{display:flex; align-items:center; gap:10px; padding:14px 20px; border-top:1px solid var(--rule)}
.ed-foot .spacer{flex:1}
.ed-save{font-family:var(--sans); font-weight:600; font-size:.85rem; color:var(--surface); background:var(--btn); border:none; border-radius:999px; padding:9px 20px; cursor:pointer}
.ed-save:hover{opacity:.9}
.ed-del{font-family:var(--sans); font-size:.82rem; color:var(--f-warn); background:none; border:1px solid var(--rule); border-radius:999px; padding:8px 14px; cursor:pointer}
.ed-del:hover{border-color:var(--f-warn)}

/* ============================================================
   RESPONSIVO
   ============================================================ */
.overlay{display:none; position:fixed; inset:0; background:rgba(25,25,25,.35); z-index:40}
@media (max-width:900px){
  body{font-size:18px}
  .topbar{display:flex}
  .main{margin-left:0; padding:0 22px}
  .reader{padding:36px 0 90px}
  .side{position:fixed; top:0; left:0; z-index:45; height:100vh; transform:translateX(-100%); transition:transform .25s ease; box-shadow:0 0 40px rgba(25,25,25,.12)}
  .side.open{transform:none}
  .overlay.show{display:block}
  .duo{grid-template-columns:1fr}
  .facts .f-row{grid-template-columns:1fr; gap:4px}
  .bars .bar{grid-template-columns:96px 1fr 42px; gap:8px}
}

:focus-visible{outline:2px solid var(--f-focus); outline-offset:2px; border-radius:4px}
@media (prefers-reduced-motion:reduce){*{animation:none !important; transition:none !important; scroll-behavior:auto !important}}
</style>
</head>
<body>

<div class="progress" id="progress" aria-hidden="true"></div>

<div class="topbar">
  <button class="menu-btn" id="menuBtn" aria-label="Abrir capítulos">☰ Capítulos</button>
  <span class="tb-title">Biblioteca</span>
</div>

<div class="overlay" id="overlay"></div>

<div class="shell">

  <aside class="side" id="side">
    <a href="#" class="brand" id="brand">Biblioteca<small>Guias visuais de estudo</small></a>
    <button class="new-btn" id="newBtn">+ Novo capítulo</button>
    <input class="search" id="search" type="search" placeholder="Buscar capítulo…" aria-label="Buscar capítulo">
    <p class="side-label">Capítulos</p>
    <ul class="toc" id="toc"></ul>
  </aside>

  <main class="main">
    <div class="reader" id="reader"><!-- capítulos renderizados via JS --></div>
  </main>

</div><!-- /shell -->

<!-- ============================================================
     EDITOR: criar / editar capítulo
     ============================================================ -->
<div class="editor-back" id="editorBack"></div>
<div class="editor" id="editor" role="dialog" aria-modal="true" aria-labelledby="edMode">
  <div class="ed-head">
    <span class="ed-mode" id="edMode">Novo capítulo</span>
    <button class="ed-x" id="edCancel" type="button">Fechar</button>
  </div>
  <div class="ed-fields">
    <label>Kicker (linha acima do título)
      <input id="edKicker" type="text" placeholder="Ex.: Neurociência · Parte I">
    </label>
    <div class="ed-row">
      <label>Número
        <input id="edNum" type="text" placeholder="01">
      </label>
      <label>Etiqueta
        <input id="edTag" type="text" placeholder="Ex.: Foco &amp; atenção">
      </label>
    </div>
    <label>Título
      <input id="edTitle" type="text" placeholder="Título do capítulo">
    </label>
    <label>Subtítulo
      <input id="edSub" type="text" placeholder="Uma frase curta de abertura">
    </label>
    <label>Conteúdo</label>
    <div class="ed-toolbar">
      <button type="button" data-cmd="formatBlock" data-val="h2" title="Título de seção">H2</button>
      <button type="button" data-cmd="formatBlock" data-val="h3" title="Subtítulo">H3</button>
      <button type="button" data-cmd="formatBlock" data-val="p" title="Parágrafo">¶</button>
      <button type="button" data-cmd="bold" title="Negrito"><b>B</b></button>
      <button type="button" data-cmd="italic" title="Itálico"><i>I</i></button>
      <button type="button" data-cmd="insertUnorderedList" title="Lista">• Lista</button>
      <button type="button" data-cmd="formatBlock" data-val="blockquote" title="Citação">❝ Citação</button>
      <button type="button" data-cmd="callout" data-val="key" title="Bloco de nota">Nota</button>
      <button type="button" data-cmd="callout" data-val="apply" title="Bloco de aplicar">Aplicar</button>

  <article class="chapter" data-key="neuroplasticidade" data-num="01" data-tag="Foco &amp; atenção">
    <p class="ch-kicker">Neurociência · Parte I</p>
    <h1>Neuroplasticidade</h1>
    <p class="ch-sub">O cérebro adulto muda. Mas, depois dos ~25 anos, só sob um conjunto químico preciso.</p>

    <div class="equation" aria-label="A fórmula química da plasticidade">
      <div class="terms">
        <div class="term"><span class="tt k-alerta">Alerta</span><span class="nm">Epinefrina</span><span class="sr">Locus coeruleus</span></div>
        <div class="op">+</div>
        <div class="term"><span class="tt k-foco">Foco</span><span class="nm">Acetilcolina</span><span class="sr">Tronco encefálico</span></div>
        <div class="op">+</div>
        <div class="term"><span class="tt k-marca">Marcação</span><span class="nm">Acetilcolina</span><span class="sr">Núcleo basal</span></div>
      </div>
      <p class="result">→ o cérebro adulto não só <em>pode</em> como <em>precisa</em> mudar</p>
    </div>

    <h2>01 · O que muda, e o que não</h2>
    <p class="lead">Você não nasceu com um cérebro pronto que depois se desgasta. Nasceu com um rascunho que se esculpe por subtração.</p>

    <p>Vale começar desfazendo a imagem intuitiva. A gente pensa no bebê como um cérebro pequeno e incompleto que vai ganhando peças. É quase o contrário. O recém-nascido chega <strong>superconectado</strong>: axônios e dendritos ligados a torto e a direito, como um emaranhado de estradinhas sem nenhuma rodovia. É por isso que o bebê é uma trapalhada motora, o "potato bug" de braços e pernas que não coordena nada e não fala. Não falta fiação, sobra. O que acontece do nascimento até por volta dos <strong>25 anos</strong> é sobretudo uma <strong>poda</strong>: as conexões que servem aos seus objetivos são reforçadas e viram rodovia, e as que não servem são removidas. Você não é montado peça a peça, você é esculpido, e o cinzel principal é a remoção.</p>

    <p>Nem todo circuito, porém, entra nesse jogo, e ainda bem. Uma parte grande do cérebro existe para <strong>representar o mundo externo</strong> (o mapa do que você vê, ouve, cheira) e essa parte é plástica a vida toda. Mas os circuitos que controlam batimento cardíaco, respiração e digestão foram fiados para <strong>não</strong> mudar. Imagine ter que decidir, a cada instante, se o coração vai bater. A rigidez, aqui, é uma dádiva: você quer que essas funções sejam entediantemente confiáveis.</p>

    <div class="duo">
      <div class="d-card plastic">
        <span class="d-badge">Plástico, muda</span>
        <h4>O mapa do mundo</h4>
        <p>As representações do que você vê, ouve e cheira. A experiência remodela esse mapa ao longo de toda a vida.</p>
      </div>
      <div class="d-card fixed">
        <span class="d-badge">Fixo, confiável</span>
        <h4>As funções vitais</h4>
        <p>Batimento, respiração, digestão. Projetados para não se alterar, porque a vida depende de eles serem previsíveis.</p>
      </div>
    </div>

    <p>Nesse período, aliás, o cérebro tem um poder que depois perde: aprender com <strong>uma única tentativa</strong>. Um evento marcante, bom ou ruim, é gravado de uma vez e muda o sistema nervoso para sempre, a menos que você faça um trabalho deliberado para desfazê-lo. É também o que torna a infância prodigiosa de um jeito que a gente subestima: a criança vai de nenhuma palavra a frases inteiras, <em>inclusive frases que nunca ouviu</em>. Ela não está copiando, está compondo. O cérebro jovem é, literalmente, uma máquina de plasticidade.</p>

    <p>E aí, por volta dos <strong>25 anos</strong>, tudo muda. Aqui mora um mito que circula em toda palestra motivacional: "neurônios que disparam juntos se conectam juntos" (frase popularizada por Carla Shatz nos anos 90, como síntese de uma ideia bem mais antiga, de Donald Hebb). O problema não é a frase, é o que se cala. Ela descreve com precisão como o sistema nervoso se conecta <strong>no início do desenvolvimento</strong>, e <strong>deixa de valer do mesmo jeito depois dos 25</strong>. O mesmo vale para a citação célebre de Ramón y Cajal, sobre sermos escultores do próprio sistema nervoso: soa lindo, e não diz <em>como</em>. Depois dos 25, mudar aquelas super-rodovias exige processos específicos, e esses processos têm <strong>portões</strong>. Você não decide mudar o cérebro; você precisa alterar o seu estado interno de um jeito que permita a mudança. O resto deste capítulo é sobre esses portões.</p>

    <p>Antes disso, cai outro mito querido. Você provavelmente já leu que correr ou se exercitar "faz o cérebro criar neurônios novos". A notícia desconfortável é que, depois da puberdade, o cérebro humano adiciona <strong>pouquíssimos, talvez nenhum</strong>, neurônio novo. A neurogênese é real e robusta em roedores (no bulbo olfatório e no giro denteado do hipocampo), mas em humanos adultos, quando aparece, é num número tão pequeno que, na prática, dá para tratar como zero.</p>

    <p>Há uma exceção que ilumina a regra: o <strong>olfato</strong>. Os neurônios que ficam no seu nariz mandam fios que precisam atravessar uma placa óssea, e uma pancada forte na cabeça pode <strong>cisalhar</strong> esses fios, deixando a pessoa sem sentir cheiro. Ao contrário de quase todo o resto do sistema nervoso central, esses conseguem crescer de volta, e até há reposição de neurônios no bulbo olfatório, vindos de dentro do cérebro por uma rota própria. É a prova de que o corpo <em>sabe</em> repor neurônios quando vale a pena. Só que ele não faz isso onde você gostaria.</p>

    <div class="callout key">
      <p class="c-label">Honestidade sobre a neurogênese adulta</p>
      <p>Esse "zero" é uma <strong>aproximação prática</strong>, não um veredito, e a história é mais viva do que o episódio deixa ver. Em 2018, dois estudos de peso colidiram de frente: um não achou <em>nada</em> detectável no adulto, outro achou neurogênese persistindo até a velhice. A briga não foi resolvida no empate, e evidência mais recente (inclusive a descoberta de células progenitoras <em>em proliferação</em> no hipocampo adulto) inclinou a balança para <strong>"sim, existe, em taxa baixa"</strong>. Ou seja: dizer "não acontece" já está atrás da literatura; dizer "está resolvido" é exagero.</p>
      <p>Mas repare que nada disso muda a conclusão prática, e é por isso que ela é sólida: <strong>até quem defende a neurogênese fala de taxas pequenas demais</strong> para explicar o aprender. Se aquela taxa importa para memória e habilidade é uma pergunta em aberto. <strong>Não é aí que mora a plasticidade.</strong></p>
    </div>

    <p>Então, se não são neurônios novos, o que muda? A resposta é o coração de tudo que vem a seguir: o cérebro muda <strong>fortalecendo e enfraquecendo as conexões que já existem</strong>. Uma sinapse pouco usada é podada; uma sinapse relevante fica mais forte, mais confiável, mais provável de disparar (é o que a literatura chama de LTP e LTD, potenciação e depressão de longo prazo, esta última sem nenhuma relação com depressão emocional). Aprender algo novo e <em>desaprender</em> algo, como tirar a carga emocional de um trauma ou atravessar um luto, são o mesmo mecanismo visto de dois lados: religar a rede. E repare que a <strong>remoção</strong> não é o prêmio de consolação; é metade do trabalho.</p>

    <p>Há ainda um detalhe físico que explica por que isso fica mais difícil com a idade, e ele é quase tátil. No cérebro jovem existe muito <strong>espaço entre os neurônios</strong>, e eles praticamente se mexem para experimentar conexões, largando umas e ficando com outras. Com os anos, esse espaço vai sendo preenchido por matriz extracelular e por células gliais (glia quer dizer <em>cola</em>), como quem despeja concreto entre as pedras. As peças ainda se movem. Só que agora custa.</p>

    <h2>02 · O córtex é um mapa da experiência</h2>
    <p class="lead">Não existe um cérebro-padrão. O seu é um mapa customizado da vida que você viveu, e ele se redesenha conforme o que compete por espaço.</p>

    <p>A prova mais impressionante disso vem dos casos de perda. Quem nasce cego não tem um córtex "visual" ocioso esperando por olhos que funcionem: aquele território, o <span class="k-foco">córtex occipital</span>, é <strong>tomado</strong> por outras funções e passa a processar audição e o tato da leitura em braille. E não é um reaproveitamento de segunda linha. Cegos de nascença costumam ter acuidade auditiva e tátil muito superiores, e a incidência de <strong>ouvido absoluto</strong> entre eles é muito maior que na população geral. O território não fica vago; ele vira o que a sua experiência precisar que ele vire.</p>

    <p>Quão longe isso vai fica claro num caso trágico que o episódio relata: uma mulher cega desde o nascimento, cujo córtex "visual" havia se tornado responsável por ler braille e por ouvir, sofreu um AVC bem ali. O resultado é quase difícil de imaginar: ela ficou pior <em>de audição e de leitura</em>, porque a região "visual" já não era visual havia muito tempo, era o motor dos outros sentidos. O mapa tinha sido redesenhado tão a fundo que uma lesão na "área visual" derrubou funções que nada tinham a ver com enxergar.</p>

    <p>O mesmo vale para o olfato: há pessoas que, por mutação genética, nascem sem nariz e sem as estruturas olfativas do cérebro. O território que representaria cheiro não fica esperando: é ocupado por tato, audição e visão. E não é preciso um caso extremo para ver o princípio. Se dois dedos são <strong>colados um ao outro</strong> no início do desenvolvimento, de modo que nunca se movam de forma independente, as representações deles <strong>se fundem</strong> no cérebro, e a pessoa passa a não distinguir direito os movimentos e as sensações de cada um. O cérebro não mapeia os dedos que você tem: mapeia os dedos que se <em>movem separadamente</em>.</p>

    <p>A generalização é forte: o córtex representa <strong>o corpo e a vida que você tem</strong>, não um plano genérico. Quem nasce com um coto no lugar da mão terá o cérebro mapeando aquele corpo, não outro. Foi um insight dessa linhagem que rendeu a Hubel e Wiesel o Nobel, ao estudarem o sistema visual: o córtex mede a <strong>quantidade de atividade</strong> que chega de cada parte do corpo e distribui seu território conforme essa atividade. Guarde essa palavra, atividade, porque a próxima seção mostra que é ela, e não a mera experiência, que decide o que o mapa vira.</p>

    <p>E o mapa não é só do corpo. Você também carrega um <strong>mapa emocional</strong>: de quem é confiável e quem não é, de que lugares são seguros, de qual tom de voz aperta o seu peito. Ele foi desenhado pela sua experiência exatamente como o mapa dos dedos, e é por isso que a seção seguinte, que parece falar de sentimento, na verdade fala do mesmo mecanismo.</p>

    <div class="callout warn">
      <p class="c-label">O princípio de Kennard, e o seu limite</p>
      <p>Você vai encontrar por aí o <strong>"princípio de Kennard"</strong>: se for para ter uma lesão cerebral, melhor tê-la <em>cedo</em>, porque a recuperação seria maior. A intuição por trás não é besteira, e conversa com tudo que você leu aqui: quem cega aos 50 aproveita muito menos o córtex "visual" do que quem nasceu cego, porque o cérebro dos 50 já não é o dos 5.</p>
      <p><strong>Mas, como princípio, ele não se sustenta</strong>, e vale saber disso. O nome foi cunhado décadas depois, por terceiros; a própria Margaret Kennard nunca defendeu uma lei simples de "mais cedo é melhor" (ela já modelava localização, lateralidade e domínio). Nos dados dela, os animais lesionados na infância desenvolveram <em>mais</em> problemas motores depois. E a literatura moderna mostra que, para funções executivas, a lesão precoce costuma sair <strong>mais cara</strong>: plasticidade e vulnerabilidade são dois extremos do mesmo contínuo. A revisão que virou referência sobre o tema resume sem piedade: não é de Kennard, e não é um princípio. Guarde a intuição sobre janelas de desenvolvimento; <strong>descarte a lei</strong>.</p>
    </div>

    <div class="callout term">
      <p class="c-label">A regra por trás</p>
      <p>Se o cérebro é um mapa de atividade, mudar o mapa exige mudar o padrão de atividade, de forma seletiva e sustentada. Não basta "passar por" uma experiência; é preciso que ela domine a atividade daquela região. É o preço que a plasticidade adulta vai cobrar de você.</p>
    </div>

    <h2>03 · Consciência é o passo zero</h2>
    <p class="lead">Antes de qualquer protocolo, existe um gesto pequeno e decisivo: reconhecer o que você quer mudar.</p>

    <p>O episódio conta uma história que parece miúda e diz tudo. Num curso, uma mulher procurou o apresentador e disse, sem rodeios, que a voz dele a estressava: o tom lembrava alguém de uma experiência ruim do passado. Ela não pediu que ele mudasse, ele não podia, só nomeou o que sentia. Ao longo das duas semanas seguintes, ela voltava para relatar que, <strong>só por ter trazido aquilo à consciência</strong>, a voz estava ficando mais tolerável. No fim, viraram amigos. Nada mudou na voz; o que mudou foi ela ter tornado consciente uma reação até então automática.</p>

    <p>Esse é, literalmente, o primeiro passo da neuroplasticidade, e ele tem um mecanismo, não é auto-ajuda. O sistema nervoso opera em dois modos: o <strong>reflexo</strong> (respirar, o coração bater, até andar, que você faz sem pensar) e o <strong>deliberado</strong>. Quando você traz algo à consciência, um comportamento que quer mudar, uma informação que quer aprender, o seu <span class="k-marca">córtex pré-frontal</span> sinaliza ao resto do sistema que aquilo <em>merece atenção</em> e deixa de estar condenado a ser automático. E não é um conceito nebuloso: esse reconhecimento dispara neuroquímicos específicos, os mesmos três que a seção 05 vai detalhar.</p>

    <p>Repare no contraste que fecha o argumento. Nenhuma criança entra na escola dizendo "hoje eu quero aprender a estrutura da língua" ou "quero aprender interação social". Ela não precisa: o interruptor já está ligado, e a mudança acontece com ela por perto. <strong>Essa é a beleza da infância, e é exatamente o que você perdeu.</strong> Depois dos 25, nada disso vem de graça: você tem que ser <em>deliberado</em>, tem que saber o que quer mudar. E identificar o alvo costuma ser a parte mais difícil de todas, porque exige admitir o que não está funcionando.</p>

    <div class="callout warn">
      <p class="c-label">A maior mentira sobre neuroplasticidade</p>
      <p>Você vai ouvir mil vezes que "toda experiência muda o seu cérebro" e que "seu cérebro vai estar diferente depois desta aula". No adulto, isso é <strong>falso</strong>. O sistema nervoso não muda só porque algo aconteceu; ele muda quando os neuroquímicos certos são liberados e permitem que os neurônios ativos <em>naquele momento</em> reforcem ou enfraqueçam suas conexões. Muda o que você <strong>atende</strong>, e só isso. Assistir não é aprender.</p>
    </div>

    <h2>04 · A descoberta: atenção reconfigura o adulto</h2>
    <p class="lead">Duas experiências separadas por vinte anos mostram que o portão da plasticidade adulta é a atenção seletiva. E que os pais da área erraram numa parte decisiva.</p>

    <p>Comece pela pista que Hubel e Wiesel deixaram sem perceber o alcance. Fechar <strong>um só</strong> olho no início do desenvolvimento produzia uma reorganização enorme: o olho aberto <em>tomava o território</em> do fechado. Já fechar <strong>os dois</strong> não produzia essa tomada de território. O detalhe decisivo é que o resultado da privação dos dois olhos <strong>não é a soma de duas privações de um olho</strong>, e é isso que revela o mecanismo. Se o que importasse fosse apenas a falta de luz, tapar os dois deveria causar o dobro do estrago. Não causa. O que redesenha o mapa não é a privação, é o <strong>desequilíbrio</strong>: quando um lado perde e o outro não, há disputa, e a disputa redistribui território.</p>

    <div class="callout warn">
      <p class="c-label">Precisão, porque a versão simplificada erra aqui</p>
      <p>É comum ouvir que tapar os dois olhos "não causava mudança nenhuma". <strong>Não é verdade</strong>, e a diferença importa. A privação binocular também faz estrago, só que de <em>outro tipo</em>: em vez da tomada de território, ela degrada a <strong>especificidade</strong> dos neurônios (a sintonia fina para orientação e direção). As células continuam respondendo aos dois olhos, mas pior. O que a comparação mostra não é "dois olhos = nada"; é que <strong>competição e privação são mecanismos diferentes</strong>. E é a competição que redistribui o mapa.</p>
    </div>

    <p>Guarde a consequência, porque ela volta na vida adulta e é dura: <strong>para ganhar algo, algo tem que ceder</strong>. Você não adiciona conexões sem remover outras. Ao pensar em mudar, a pergunta não é só o que você quer <em>ganhar</em>, é o que você está disposto a <em>abrir mão</em>. Parece um castigo e é, na verdade, a própria alavanca.</p>

    <p>Disso eles tiraram a ideia de <strong>período crítico</strong>: se a visão nítida não acontecesse cedo, o cérebro se reconfiguraria em torno do que chegava, e depois não haveria volta. A metade prática dessa conclusão salvou muita gente: é por isso que catarata congênita e estrabismo são corrigidos <em>cedo</em>, e é o que oftalmologistas fazem até hoje. Mas a outra metade, a de que <strong>depois</strong> não haveria resgate possível, estava errada. E é aqui que a história fica boa: os dois cientistas que fundaram o campo, e que mereciam o Nobel que ganharam, deixaram como herança uma tese pessimista que a geração seguinte teve que desmontar.</p>

    <p>Quem desmontou foi Gregg Recanzone, no laboratório de Mike Merzenich, na UCSF, no início dos anos 90. Eles treinaram macacos-coruja <em>adultos</em>, bem fora do período crítico, numa tarefa tátil que exigia distinguir diferenças sutis de vibração num pontinho do dedo, algo que só funciona com atenção real. Conforme os animais melhoravam, o mapa cortical daquele dedo (na área <strong>3b</strong>) se <strong>expandia</strong>. O cérebro adulto, que a doutrina dava como fechado para reformas, estava se reorganizando ali, conforme o treino.</p>

    <p>Mas a peça-chave é o controle. Outros animais receberam <strong>exatamente a mesma estimulação</strong>, no mesmo ponto de pele, com uma diferença só: tinham que prestar atenção a um <strong>som</strong>, não ao dedo. Neles, o mapa do tato <strong>não mudou</strong>. Mesmo toque, mesma pele, mesmas horas de treino, e nenhuma reorganização. O que faltou não foi estímulo: foi <strong>relevância</strong>.</p>

    <p>E existe o experimento espelhado, que fecha o argumento de um jeito que a versão popular costuma estragar. Num estudo irmão, os animais foram treinados numa tarefa <em>auditiva</em>, e aí quem se reorganizou foi o <strong>córtex auditivo</strong>; os controles ouviram <em>os mesmos sons</em> enquanto faziam uma tarefa tátil, e o córtex auditivo deles não mudou. Junte os dois e o par é simétrico: <strong>atenção ao tato muda o córtex do tato; atenção ao som muda o córtex do som</strong>; e, nos dois casos, o mesmo estímulo <em>desatendido</em> não muda nada. A plasticidade não vaza para onde a atenção foi. Ela acontece <strong>onde a atenção está</strong>, e só lá.</p>

    <div class="callout term">
      <p class="c-label">A lição que desmonta o mito</p>
      <p>Não é a experiência que muda o cérebro; é a experiência <strong>à qual você presta atenção</strong>. O mesmo estímulo, sem atenção, não gravava nada. A atenção não é um detalhe do aprendizado adulto: é o interruptor que decide se, e onde, ele acontece.</p>
    </div>

    <h2>05 · Os três ingredientes químicos</h2>
    <p class="lead">A atenção abre o portão por meio de três neuroquímicos. Juntos, eles não deixam o cérebro escolher: ele muda.</p>

    <p>Quando você presta atenção de verdade, o cérebro libera neuromoduladores que "marcam" os circuitos com chance de mudar. São três atores, e a ordem importa. O primeiro é a <strong>epinefrina</strong> (a mesma molécula que, no corpo, chamamos adrenalina), liberada do <strong>locus coeruleus</strong>, no tronco encefálico. Ela é deliberadamente inespecífica: banha o cérebro inteiro e aumenta a probabilidade de os neurônios dispararem. É o alerta bruto. A regra é simples e implacável: <strong>sem alerta, nenhuma plasticidade</strong>.</p>

    <p>Guarde um detalhe que incomoda e explica muita coisa: <strong>a molécula do foco é a mesma do estresse</strong>. Não existe uma "adrenalina boa" do aprendizado e outra ruim da ansiedade. É a mesma, e é por isso que aprender de verdade nunca vai ser confortável. A sensação de estar meio agitado não é o preço do processo, é o processo.</p>

    <p>Mas alerta sozinho não basta: é necessário e <strong>insuficiente</strong>. A prova está nos próprios dados de Hubel e Wiesel, que compararam plasticidade em sujeitos acordados e dormindo. É de onde vem a má notícia para a fantasia mais antiga do estudante: <strong>você não aprende ouvindo coisas enquanto dorme</strong>. Deixar o áudio tocando à noite não instala nada. (Mais adiante você vai ver que o sono <em>é</em> decisivo, mas por um motivo completamente diferente.)</p>

    <div class="steps">
      <div class="step"><div class="st-n">1</div><div>
        <h4 class="k-alerta">Epinefrina: o alerta</h4>
        <p>Do <strong>locus coeruleus</strong>. Banha o cérebro todo e o deixa pronto para disparar. Sem ela, nada começa, mas sozinha não muda nada: é o portão que precisa abrir primeiro.</p>
      </div></div>
      <div class="step"><div class="st-n">2</div><div>
        <h4 class="k-foco">Acetilcolina do tronco: o holofote</h4>
        <p>De uma fonte no tronco encefálico, agindo no <strong>tálamo</strong>, que filtra o que entra pelos sentidos. Amplifica <em>um</em> sinal acima de todos os outros, o "grito na multidão", elevando a relação sinal-ruído daquilo que você escolheu atender.</p>
      </div></div>
      <div class="step"><div class="st-n">3</div><div>
        <h4 class="k-marca">Acetilcolina do núcleo basal: a marcação</h4>
        <p>Do <strong>núcleo basal de Meynert</strong>, no prosencéfalo. É a peça que faltava: marca o circuito destacado para ser consolidado. (Não por acaso, é o principal sítio que degenera na demência e no Parkinson, quando a capacidade de focar se perde.)</p>
      </div></div>
    </div>

    <p>A prova de que são exatamente esses três não é indireta. Kilgard e Merzenich foram diretos ao ponto: pareando a <strong>estimulação do núcleo basal</strong> com um som, em ratos adultos, conseguiram <strong>reorganizar o córtex auditivo em torno daquele som</strong>. O núcleo basal, sozinho, funcionou como o sinal de "isto aqui importa" que a atenção normalmente daria. Ou seja, dá para <em>fabricar</em> a plasticidade por fora, contornando a atenção, se você entregar a química.</p>

    <div class="callout warn">
      <p class="c-label">Cuidado com a versão heroica</p>
      <p>Você vai ouvir que isso produz "aprendizado massivo numa única tentativa". <strong>Não foi o que aconteceu.</strong> No estudo, a reorganização foi <strong>progressiva</strong> e o pareamento foi <em>episódico e repetido ao longo de semanas</em>. A conclusão correta é forte o bastante sem o exagero: a química certa <strong>habilita</strong> a mudança, mas não dispensa a repetição.</p>
    </div>

    <div class="callout key">
      <p class="c-label">O princípio</p>
      <p>Com epinefrina mais as duas fontes de acetilcolina liberadas juntas, o cérebro não apenas <strong>pode</strong> mudar: ele <strong>tem</strong> que mudar. Isso deixou de ser hipótese e virou princípio básico da neurociência. Todo o resto do capítulo é sobre como acionar esses três pelo comportamento, sem eletrodo nenhum.</p>
    </div>

    <h2>06 · Protocolos: os três canais que você controla</h2>
    <p class="lead">Você não vai baixar um eletrodo no próprio núcleo basal. Mas dá para acionar os mesmos três químicos pelo comportamento.</p>

    <h3 class="k-alerta">Canal 1 · Alerta (a epinefrina)</h3>
    <p>A base do alerta é chata e inegociável: <strong>sono</strong>. Sua capacidade de foco deliberado é proporcional a quão bem você dorme, então isso vem antes de qualquer truque. Sobre essa base, a <strong>cafeína</strong> ajuda, e a motivação também, com uma sutileza libertadora: para efeito de epinefrina, <strong>o cérebro não distingue a origem da excitação</strong>. Amor, medo, raiva, vergonha, tudo dispara a mesma adrenalina. Por isso a recomendação não é "ame o que faz", é ter <strong>duas ou três razões</strong> ao mesmo tempo, misturando o que te puxa (uma meta que empolga) e o que te empurra (o medo de não cumprir). Um aviso do próprio episódio: cuidado com a "armadilha da dopamina", anunciar a meta em voz alta e colher tantos elogios que o cérebro se dá por satisfeito e você nunca faz. Guarde o anúncio; gaste a energia na tarefa.</p>

    <h3 class="k-foco">Canal 2 · Foco (a acetilcolina)</h3>
    <p>Aqui está o achado mais prático do episódio: <strong>o foco mental segue o foco visual</strong>. Quando você converge os dois olhos num ponto pequeno (o mesmo movimento que um pássaro faz para bicar uma semente com precisão), você não só estreita a janela visual, você <strong>aciona</strong> os neurônios do tronco que liberam a acetilcolina e a epinefrina do foco. Traduzido em protocolo: antes de estudar, fixe o olhar numa pequena região (a folha, um ponto da tela) por <strong>60 a 120 segundos</strong>. Parece bobo e é o gatilho. Se o aprendizado for auditivo, faça o equivalente: <strong>feche os olhos</strong> para criar um cone de atenção sonora (é o que cegos e grandes músicos fazem instintivamente; não é à toa que pedir a alguém para "olhar nos seus olhos e escutar" ao mesmo tempo é a pior forma de ser ouvido). E um sinal de calibragem: focar assim gera <strong>agitação</strong>, aquele incômodo de querer desviar. Sentir isso não é fracasso, é a epinefrina no sistema; provavelmente você está fazendo certo.</p>
    <p>Um detalhe pequeno que ajuda: conforme você cansa, as suas <strong>piscadas ficam mais longas</strong>, e a pálpebra passa mais tempo fechada, porque os neurônios do tronco que a seguram aberta começam a falhar. Daí a frase "eu mal conseguia manter os olhos abertos" ser literal. Piscar é necessário, o olho precisa lubrificar; mas a <em>duração</em> das piscadas é um termômetro honesto do seu alerta. Se elas estão se arrastando, não adianta insistir: o problema não é disciplina, é estado. <span style="color:var(--muted)">O robusto aqui é a duração da piscada; a <em>frequência</em> dá resultados inconsistentes na literatura.</span></p>

    <p>Uma palavra sobre atalhos farmacológicos, porque a pergunta é inevitável. A nicotina (via Nicorette) de fato aumenta a acetilcolina, e não é bro science: ela se chama assim porque a acetilcolina se liga ao receptor <strong>nicotínico</strong>, justamente o ramo ligado à atenção. Só que ela deixa muita gente trêmula, e estar colinérgico o dia inteiro destrói justamente o que importa: criar uma <em>janela</em> de foco distinta do resto do dia. E o Adderall, ao contrário do que se acredita, sobe o <strong>alerta</strong>, não o foco; ele nem toca o sistema da acetilcolina. Quem sente "mais foco" com ele provavelmente só estava sonolento demais, e o Adderall corrigiu isso, não o foco.</p>

    <div class="callout warn">
      <p class="c-label">O celular não te distrai por acaso: ele é bom demais nisto</p>
      <p>Muita gente se convenceu de que "tem um TDAH levinho". Vale considerar outra explicação antes. O celular <strong>ancora</strong> a sua atenção com uma facilidade quase perfeita, e por dois motivos de projeto. Primeiro, ele é <strong>pequeno</strong>: limitar a janela visual àquele retângulo é exatamente o que a seção acima descreve como o gatilho do foco, só que feito para você, de graça. Segundo, ele é cheio de <strong>movimento</strong>, e o sistema atencional gravita para movimento sem pedir licença. Se uma imagem vale mil palavras, um vídeo vale dez mil imagens.</p>
      <p>A consequência é a que te trouxe até aqui: quanto mais você consome coisas que se movem e se explicam sozinhas, <strong>pior</strong> você fica em atender a texto numa página ou a um raciocínio que não tem trilha sonora. E há um custo de estoque, não só de hábito: a sua acetilcolina e a sua epinefrina são <strong>finitas no dia</strong>. Cada hora gasta num consumo passivo que não te constrói é uma hora de química que não estará lá quando você abrir o editor.</p>
    </div>

    <h3 class="k-marca">Canal 3 · Duração (o bloco)</h3>
    <p>O foco tem um formato natural: ciclos <strong>ultradianos</strong> de cerca de <strong>90 minutos</strong>. Um bom bloco de estudo dura mais ou menos isso, incluindo <strong>5 a 10 minutos de aquecimento</strong> no começo, então permita-se não estar afiado nos primeiros minutos; o miolo é onde o foco se sustenta. Ao longo do bloco, a atenção <strong>vai</strong> derivar, isso é esperado. O truque não é impedir a deriva, é <strong>re-ancorar</strong> sempre que ela acontece, trazendo o olhar de volta ao objeto. Esse retorno repetido não é o obstáculo ao exercício: ele <em>é</em> o exercício.</p>

    <p>Sobre eliminar distração, vale registrar que a coisa é mais braçal do que gostaríamos. Não basta "querer": desligue o wi-fi, ponha o celular em outro cômodo, e, se você se pegar levantando reflexamente para buscá-lo, aumente a fricção de verdade, trancando o aparelho no carro. O episódio relata até casos de jogar o telefone no telhado para não conseguir pegá-lo até o fim do dia. O ponto não é o método pitoresco: é reconhecer que aquilo foi desenhado para vencer você, e que perder para ele não é falha de caráter.</p>

    <p>E não caia na tentação de focar o dia inteiro. Dá para treinar até <strong>3 ou 4 blocos</strong> desses por dia, mas essa é a exceção, não a meta. Os altos desempenhos que o episódio descreve fazem <em>poucas</em> sessões intensas e passam o resto do tempo caminhando pelo corredor, resmungando sozinhos, pedalando, com a mente solta. Foco o dia inteiro não é sinal de seriedade; é sinal de que você não entendeu como o sistema funciona.</p>

    <h2>07 · A plasticidade acontece dormindo</h2>
    <p class="lead">O segredo que quase ninguém conta: o foco não muda o cérebro. Ele só marca onde a mudança vai ocorrer, mais tarde, no sono.</p>

    <p>Este é o ponto que reorganiza tudo. Por mais intenso que seja, o esforço focado durante a vigília <strong>não</strong> reconfigura o circuito na hora. O que ele faz é deixar uma <strong>marca</strong> química e metabólica nas sinapses que você acionou, uma etiqueta de "mexer aqui". A reconfiguração de fato, fortalecer o que foi marcado e podar o resto, acontece depois, enquanto você <strong>dorme</strong>, naquela e nas noites seguintes. É por isso que uma noite ruim logo após um aprendizado costuma não perder o trabalho: a marca persiste, e a consolidação acontece na próxima noite decente. Mas sem nunca chegar ao sono profundo, a mudança simplesmente não se instala.</p>

    <p>E há um segundo caminho, que não substitui o sono mas soma: o <strong>descanso desperto</strong> logo depois de aprender. O achado que sustenta isso é bonito e mais modesto do que a versão que circula. Quando você para e fecha os olhos após uma sessão, o córtex <strong>reproduz</strong> (faz <em>replay</em> de) os padrões de disparo que acabou de treinar, acordado. E, num experimento controlado, <strong>20 a 30 minutos de repouso quieto</strong> logo após o treino deram um benefício de memória <strong>equivalente ao de um cochilo</strong>, e ambos foram melhores do que preencher o intervalo com uma tarefa distratora. O ativo aqui é o <em>vazio</em>: o que ajuda não é dormir nem descansar em si, é <strong>não jogar informação nova por cima</strong> do que você acabou de marcar.</p>

    <div class="callout warn">
      <p class="c-label">Onde a versão popular exagera (e onde este guia errou)</p>
      <p>Circula a afirmação de que <strong>20 minutos de descanso rendem mais que uma noite de sono</strong>. <strong>Não há fonte para isso</strong>, e este capítulo chegou a repeti-la antes de a checagem pegar o erro. O estudo geralmente citado (<em>Cell Reports</em>, 2020) mede <em>replay neural</em> em <strong>dois</strong> pacientes com eletrodos implantados, numa tarefa motora de quatro alvos: não tem grupo de sono, não tem protocolo de NSDR e <strong>não compara descanso com sono</strong>. O que a literatura de fato mostra é <strong>repouso ≈ cochilo</strong>, nunca repouso &gt; sono. Descanso desperto é um <strong>complemento</strong> ao sono, não um atalho que o dispensa.</p>
    </div>

    <p>E não é o único jeito de descansar bem: caminhar, correr ou pedalar coloca você em <strong>optic flow</strong> (o oposto da janela estreita de foco), o que acalma áreas como a amígdala e funciona como uma forma própria de descanso. Deixar a mente <strong>vagar</strong> depois de um bloco focado não é preguiça, é parte de aprender.</p>

    <div class="callout apply">
      <p class="c-label">A receita, montada</p>
      <p>Um bloco de <strong>~90 min</strong> com o foco ancorado nos olhos, seguido de <strong>20 a 30 min de descanso quieto</strong> (olhos fechados, sem input novo, cochilo vale), com <strong>sono profundo protegido</strong> à noite e <strong>revisão espaçada</strong> nos dias seguintes. O foco abre a janela e marca o circuito; o sono é que faz a mudança grudar, e o descanso protege a marca no intervalo. Repare que a parte mais fácil de pular é justamente a que grava: <strong>terminar de estudar e já abrir o feed</strong> é jogar informação nova por cima do que você acabou de marcar.</p>
    </div>

    <div class="callout term">
      <p class="c-label">Um incômodo honesto sobre podcast na corrida</p>
      <p>Se o descanso pós-esforço depende de deixar a mente <strong>vagar</strong>, então encher a corrida ou a caminhada de podcast e audiobook ocupa justamente a janela que faria o aprendizado grudar. O próprio episódio levanta essa ironia sobre si mesmo: é melhor você <em>colher</em> o benefício da plasticidade do que ouvir mais alguém falar sobre plasticidade. Vale para este guia também.</p>
    </div>

    <h2>08 · Resumo</h2>

    <p>Antes do resumo, um aviso que abre a porta do próximo capítulo. Tudo que você leu aqui descreve <strong>um</strong> tipo de plasticidade: a que vem do <span class="k-alerta">foco intenso</span> e da emotividade, e que o cérebro naturalmente aciona em eventos duros que você não escolheu (tocar numa panela quente grava em uma tentativa, porque o seu cérebro está tentando te manter vivo). A boa notícia é que dá para acionar essa mesma via de propósito, para coisas que você <em>quer</em>, com foco, descanso e sono.</p>

    <p>Mas existe uma <strong>segunda categoria</strong>, e ela não passa por nada disso. É a plasticidade da <strong>repetição</strong>: fazer algo aparentemente mundano, muitas vezes, acionando o sistema de recompensa e a <span class="k-dopa">dopamina</span>. Repetição, recompensa, repete. Ela não serve para aprender informação nova; serve para instalar <strong>hábitos</strong>. São dois caminhos distintos para dois problemas distintos, e confundi-los é a razão de muita gente tentar "focar mais" quando o que faltava era um sistema de repetição, ou o contrário. É exatamente disso que trata o capítulo seguinte.</p>

    <div class="takeaways">
      <p class="tk-label">A espinha dorsal</p>
      <ol>
        <li>O cérebro se esculpe por <strong>subtração</strong>: até os ~25 anos, poda o que não serve. A mudança nunca foi criar neurônios, e sim reforçar e enfraquecer conexões.</li>
        <li>"Disparam juntos, conectam juntos" vale <strong>cedo</strong>. Depois dos 25 a mudança é <strong>gated</strong>: você não decide mudar, precisa alterar o estado interno.</li>
        <li>O córtex é um <strong>mapa de atividade</strong>, personalizado pela sua experiência; mudar o mapa exige mudar a atividade, de forma seletiva.</li>
        <li><strong>Atenção seletiva</strong>, não a mera experiência, abre a janela da plasticidade adulta. A competição por território é o motor.</li>
        <li>Três ingredientes químicos juntos: <strong>epinefrina + acetilcolina do tronco + acetilcolina do núcleo basal</strong>. Com os três, o cérebro tem que mudar.</li>
        <li>O foco mental segue o <strong>foco visual</strong>: fixe os olhos numa pequena janela por 60–120 s para acionar a química.</li>
        <li>Trabalhe em blocos de <strong>~90 min</strong> (com aquecimento), re-ancorando a atenção toda vez que ela derivar.</li>
        <li><strong>A mudança se consolida no descanso</strong>: o foco só marca; o sono profundo é que grava, e o descanso quieto protege a marca.</li>
      </ol>
    </div>

      <h2 style="margin-top:22px">Ressalvas de precisão</h2>
      <ul>
        <li><strong>“20 min de descanso rendem mais que uma noite de sono” não tem fonte</strong>, e este capítulo chegou a afirmar isso antes da checagem. O estudo citado (Eichenlaub 2020) mede <em>replay</em> neural em 2 pacientes numa tarefa motora de 4 alvos: sem protocolo de NSDR, sem grupo de sono, sem comparação repouso-vs-sono. A literatura real mostra <strong>repouso ≈ cochilo</strong> (Wamsley &amp; Summer, 2021), nunca repouso &gt; sono.</li>
        <li><strong>Privação binocular não é “nenhuma mudança”.</strong> O que não ocorre é o desvio de dominância ocular; a especificidade dos campos receptivos <em>degrada</em>. O argumento da competição se apoia no fato de o efeito dos dois olhos não ser a soma de dois olhos separados.</li>

  <article class="chapter" data-key="dopamina" data-num="02" data-tag="Busca &amp; impulso">
    <p class="ch-kicker">Neurociência · Parte II</p>
    <h1>Dopamina &amp; Motivação</h1>
    <p class="ch-sub">Não é a química do prazer, é a química da <strong>procura</strong>. E funciona por uma dança entre pico e linha de base.</p>

    <div class="curve">
